version: "3.8"

services:
  redis:
    image: redis/redis-stack:latest
    container_name: mangaba-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: ankane/pgvector:latest
    container_name: mangaba-postgres
    environment:
      POSTGRES_PASSWORD: minhasenha
      POSTGRES_DB: mangaba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
